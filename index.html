<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreSkill | Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0052cc, #00bcd4);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 600px;
    padding: 20px;
}

.logo {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 20px;
}

h1 {
    font-size: 36px;
    margin-bottom: 15px;
}

p {
    font-size: 18px;
    margin-bottom: 25px;
}

.loader {
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.contact {
    margin-top: 30px;
    font-size: 14px;
    opacity: 0.9;
}

</style>
</head>

<body>

<div class="container">
    <div class="logo">CoreSkill Learning Centre</div>

    <h1>We’ll Be Back Soon 🚧</h1>

    <p>
        Our website is currently undergoing scheduled maintenance.<br>
        We’re working hard to improve your experience.
    </p>

    <div class="loader"></div><br>

    <p>Please check back later.</p>

    <div class="contact">
        📧 Email: coreskilllearningcentre@gmail.com <br><br>
        📍 UK Based Training Provider
    </div>
</div>

</body>
</html>
